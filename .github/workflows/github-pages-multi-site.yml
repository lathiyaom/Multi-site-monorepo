name: Deploy all website folders to GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages (optional)
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload all website folders
        uses: actions/upload-pages-artifact@v4
        with:
          path: |
            websites/architecture
            websites/beauty-salon
            websites/business-consultant
            websites/ca-firm
            websites/dental-clinic
            websites/education-institute
            websites/fitness-gym
            websites/interior-design
            websites/law-firm
            websites/life-coach
            websites/medical-clinic
            websites/premium-restaurant
            websites/real-estate

      - name: Deploy all sites
        uses: actions/deploy-pages@v4
