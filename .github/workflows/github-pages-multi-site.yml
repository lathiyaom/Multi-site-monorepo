name: Deploy all website folders to GitHub Pages
on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages (optional)
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload all website folders
        uses: actions/upload-pages-artifact@v4
        with:
          path: |
            architecture
            beauty-salon
            business-consultant
            ca-firm
            dental-clinic
            education-institute
            fitness-gym
            interior-design
            law-firm
            life-coach
            medical-clinic
            premium-restaurant
            real-estate
        working-directory: ./websites

      - name: Deploy all sites
        uses: actions/deploy-pages@v4
